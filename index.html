<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw ドキュメント目次</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --paper: #ffffff;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d9dee8;
      --blue: #1f6feb;
      --shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    header {
      background: #101828;
      color: #ffffff;
      padding: 44px 24px 32px;
    }

    header .inner,
    main {
      width: min(960px, calc(100% - 40px));
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    header p {
      margin: 0;
      color: #d0d5dd;
      max-width: 760px;
    }

    main {
      padding: 28px 0 60px;
    }

    .doc-card {
      display: block;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
      color: inherit;
      text-decoration: none;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .doc-card:hover,
    .doc-card:focus {
      transform: translateY(-2px);
      border-color: var(--blue);
      outline: none;
    }

    .doc-card h2 {
      margin: 0 0 8px;
      font-size: 22px;
      color: var(--blue);
    }

    .doc-card p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
    }

    code {
      background: #eef2f7;
      border-radius: 4px;
      padding: 0.12rem 0.32rem;
      font-size: 0.92em;
    }

    @media (max-width: 720px) {
      header .inner,
      main {
        width: min(100% - 24px, 960px);
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <h1>OpenClaw ドキュメント目次</h1>
      <p>OpenClaw と周辺システムの設計・運用メモへのリンク集です。</p>
    </div>
  </header>

  <main>
    <a class="doc-card" href="./openclaw-hermes-integration.html">
      <h2>OpenClaw と Hermes Agent 連携モデル整理</h2>
      <p>
        当初やりたかったHermes同士の自律連携、そこで見えたあい路事項、
        最終的に落ち着いたOpenClaw主導の連携モデルを説明した資料です。
      </p>
      <div class="meta">
        ファイル: <code>docs/openclaw-hermes-integration.html</code>
      </div>
    </a>
  </main>
</body>
</html>
