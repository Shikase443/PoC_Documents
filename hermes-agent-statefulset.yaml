  storageClassName: hermes-local-static
  claimRef:
    namespace: hermes
    name: hermes-data-hermes-agent-1
  local:
    path: /var/lib/hermes-agent/hermes-agent-1
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - pi4k8s-node02
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: hermes-data-2
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: hermes-local-static
