apiVersion: v1
kind: Namespace
metadata:
  name: hermes
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: hermes-local-static
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: false
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-hermes-nfs-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: openclaw-hermes-static
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: 10.0.1.1
    path: /home/haomei/k8s-nfs/openclaw-hermes
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-hermes-data
  namespace: hermes
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: openclaw-hermes-static
  volumeName: openclaw-hermes-nfs-pv
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: hermes-data-0
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: hermes-local-static
  claimRef:
    namespace: hermes
    name: hermes-data-hermes-agent-0
  local:
    path: /var/lib/hermes-agent/hermes-agent-0
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - pi4k8s-node01
---
apiVersion: v1
